# ─── Upstreams ───
upstream frontend {
    server lms-frontend:80;
}

upstream backend {
    server lms-backend:5000;
}

upstream ml_service {
    server lms-ml:8000;
}

upstream grafana {
    server lms-grafana:3000;
}

# ─── HTTP Server (Primary until SSL is issued) ───
server {
    listen 80;
    server_name 13.62.184.149.nip.io 13.62.184.149;

    # ─── Frontend ───
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Backend API ───
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── ML Service ───
    location /ml/ {
        proxy_pass http://ml_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Grafana ───
    location /grafana/ {
        proxy_pass http://grafana/;
        proxy_set_header Host $host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ─── Metrics ───
    location /metrics {
        proxy_pass http://backend/metrics;
    }
}

#─── HTTPS Server (Enable after cert issuance) ───
# NOTE:
# 1) Keep this block ready for production TLS.
# 2) It is intentionally commented so Nginx starts even when cert files do not exist yet.
# 3) After Certbot succeeds, uncomment this block and (optionally) add an HTTP -> HTTPS redirect.

server {
    listen 443 ssl;
    server_name 13.62.184.149.nip.io;

    ssl_certificate /etc/letsencrypt/live/lms.13.62.184.149.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lms.13.62.184.149.nip.io/privkey.pem;

    # 🔐 Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # ─── Frontend ───
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Backend API ───
    location /api/ {
        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── ML Service ───
    location /ml/ {
        proxy_pass http://ml_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Grafana ───
    location /grafana/ {
        proxy_pass http://grafana/;
        proxy_set_header Host $host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ─── Metrics ───
    location /metrics {
        proxy_pass http://backend/metrics;
    }
}