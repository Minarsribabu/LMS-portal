# ─── Upstreams ───
upstream frontend {
    server lms-frontend:80;
}

upstream backend {
    server lms-backend:5000;
}

upstream ml_service {
    server lms-ml:8000;
}

upstream grafana {
    server lms-grafana:3000;
}

# ✅ NEW: Added Prometheus upstream
upstream prometheus {
    server lms-prometheus:9090;
}

# ─── HTTP Server ───
server {
    listen 80;
    server_name 13.62.184.149.nip.io 13.62.184.149;

    # ✅ NEW: Redirect HTTP → HTTPS (production best practice)
    return 301 https://$host$request_uri;
}

# ─── HTTPS Server ───
server {
    listen 443 ssl;
    server_name 13.62.184.149.nip.io;

    ssl_certificate /etc/letsencrypt/live/13.62.184.149.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/13.62.184.149.nip.io/privkey.pem;

    # 🔐 Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # ─── Frontend ───
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Backend API ───
    location /api/ {
        proxy_pass http://backend;   # ✅ kept clean (no trailing slash issues)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── ML Service ───
    location /ml/ {
        proxy_pass http://ml_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Grafana ───
    location /grafana/ {
    proxy_pass http://lms-grafana:3000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Prefix /grafana;
    proxy_set_header X-Forwarded-Host $host; 
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    }

    # ✅ NEW: Prometheus exposed via domain
    location /prometheus/ {
    proxy_pass http://lms-prometheus:9090/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Prefix /prometheus; 
    }

    # ─── Metrics ───
    location /metrics {
        proxy_pass http://backend/metrics;
    }
}