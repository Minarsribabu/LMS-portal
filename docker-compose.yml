services:

  # ─── Nginx Reverse Proxy (Entry Point) ───
  lms-nginx:
    build: ./nginx
    container_name: lms-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - lms-frontend
      - lms-backend
      - lms-ml
      - lms-grafana
      - lms-prometheus   # ✅ ADDED (ensure nginx waits for prometheus also)
    networks:
      - lms-network
    restart: unless-stopped

  # ─── React Frontend ───
  lms-frontend:
    build: ./frontend
    container_name: lms-frontend
    ports:
      - "3000:80"
    networks:
      - lms-network
    restart: unless-stopped

  # ─── Node.js Backend ───
  lms-backend:
    build: ./backend
    container_name: lms-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://lms-mongo:27017/lms
      - ML_SERVICE_URL=http://lms-ml:8000
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production-2024
    depends_on:
      - lms-mongo
      - lms-ml
    networks:
      - lms-network
    restart: unless-stopped

  # ─── FastAPI ML Service ───
  lms-ml:
    build: ./ml-service
    container_name: lms-ml
    ports:
      - "8000:8000"
    networks:
      - lms-network
    restart: unless-stopped

  # ─── MongoDB ───
  lms-mongo:
    image: mongo:7
    container_name: lms-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - lms-network
    restart: unless-stopped

  # ─── Prometheus Node Exporter ───
  lms-node-exporter:
    image: prom/node-exporter:latest
    container_name: lms-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.netdev.device-exclude=^(veth.*)'
    networks:
      - lms-network
    restart: unless-stopped

  # ─── Prometheus ───
  lms-prometheus:
    image: prom/prometheus:latest
    container_name: lms-prometheus
    ports:
      - "9090:9090"   # ⚠️ OPTIONAL: remove later for security (nginx will handle access)
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.external-url=/prometheus/'
    depends_on:
      - lms-backend
      - lms-ml
      - lms-node-exporter
    networks:
      - lms-network
    restart: unless-stopped

  # ─── Grafana ───
  lms-grafana:
    image: grafana/grafana:latest
    container_name: lms-grafana
    ports:
      - "3001:3000"   # ⚠️ OPTIONAL: remove later (access via nginx only)
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

      # ✅ CORRECT (you already fixed this 👍)
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SERVER_ENFORCE_DOMAIN=false
      # ✅ ADDED (prevents redirect issues in some cases)
      - GF_SERVER_DOMAIN=13.62.184.149.nip.io

    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - lms-prometheus
    networks:
      - lms-network
    restart: unless-stopped

volumes:
  mongo-data:
  prometheus-data:
  grafana-data:

networks:
  lms-network:
    driver: bridge